<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Traffic</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="search-container">
        <div class="search-row">
            <span class="route-icon">🟢</span>
            <input type="text" id="origin-input" placeholder="📍 Đang lấy vị trí GPS của bạn..." autocomplete="off">
        </div>
        
        <div class="search-row" style="margin-top: 8px; border-top: 1px solid #f2f2f2; padding-top: 8px;">
            <span class="route-icon">🔴</span>
            <input type="text" id="search-input" placeholder="🔍 Nhập địa điểm cần đến tại Hà Nội..." autocomplete="off">
        </div>
        
        <div id="suggestions-box" class="suggestions-box" style="display: none;"></div>
    </div>
    <div id="map"></div>
    <div id="sidebar">
        <h2>Smart Traffic</h2>
        <p class="desc">Nhấn vào bản đồ để chọn điểm đến, hệ thống sẽ gợi ý hai tuyến đường với màu giao thông.</p>
        <div id="status-loading">Đang tải dữ liệu giao thông...</div>
        <div class="route-list" id="routesView"></div>
    </div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="uiMapServices.js"></script>
    <script src="index.js"></script>
</body>
</html>
